<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ESTRA LINK | Espace Étudiant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --estra-cyan: #38bdf8; --estra-bg-dark: #0f172a;
            --estra-card-bg: rgba(30,41,59,0.5); --estra-border: rgba(56,189,248,0.15);
            --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --estra-purple: #a78bfa; --estra-success: #10b981;
            --estra-danger: #ef4444; --coin-gold: #c9952e;
            --transition: all 0.25s ease;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--estra-bg-dark);
            background-image:radial-gradient(at 0% 0%,rgba(56,189,248,0.04) 0px,transparent 50%),radial-gradient(at 100% 100%,rgba(56,189,248,0.04) 0px,transparent 50%);
            color:var(--text-primary);font-family:'Segoe UI',system-ui,sans-serif;
            padding-bottom:16px;min-height:100vh;overflow-x:hidden;
        }
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#1e293b;border-radius:10px}::-webkit-scrollbar-thumb{background:var(--estra-cyan);border-radius:10px}

        /* NAVBAR */
        .navbar{
            padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
            border-bottom:1px solid rgba(51,65,85,.4);background:rgba(15,23,42,.9);
            backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;
        }
        .navbar-brand{font-weight:700;color:#f0a060;letter-spacing:1px;font-size:1rem;text-decoration:none}
        .btn-back{background:none;border:0;color:var(--text-secondary);font-size:1.1rem;cursor:pointer;padding:6px;border-radius:50%;transition:var(--transition)}
        .btn-back:hover{color:var(--estra-cyan);background:rgba(56,189,248,.08)}
        .btn-icon{
            background:rgba(30,41,59,.6);border:1px solid var(--estra-border);
            color:var(--text-secondary);padding:7px 12px;border-radius:8px;
            cursor:pointer;font-size:.8rem;display:flex;align-items:center;gap:5px;
            font-family:inherit;transition:var(--transition);
        }
        .btn-icon:hover{background:rgba(56,189,248,.08);color:var(--estra-cyan)}

        /* TABS */
        .tabs-container{
            display:flex;border-bottom:1px solid var(--estra-border);
            background:rgba(15,23,42,.4);position:sticky;top:52px;z-index:99;
        }
        .tab-btn{
            flex:1;padding:12px 6px;text-align:center;background:none;border:0;
            color:var(--text-secondary);cursor:pointer;font-size:.75rem;font-weight:500;
            transition:var(--transition);font-family:inherit;border-bottom:2px solid transparent;
            display:flex;flex-direction:column;align-items:center;gap:3px;
        }
        .tab-btn i{font-size:1rem}
        .tab-btn.active{color:var(--estra-cyan);border-bottom-color:var(--estra-cyan)}
        .tab-content{display:none;padding:14px}
        .tab-content.active{display:block}

        /* ============ CERTIFICATIONS ============ */
        .cert-card{
            background:rgba(30,41,59,.5);border:1px solid rgba(200,150,50,.3);
            border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;
            position:relative;overflow:hidden;
        }
        .cert-ribbon{
            position:absolute;top:10px;right:-28px;background:var(--coin-gold);
            color:#0f172a;padding:2px 35px;font-size:.6rem;font-weight:600;
            transform:rotate(45deg);
        }
        .cert-icon{font-size:2.5rem;margin-bottom:10px;color:var(--coin-gold)}
        .cert-title{font-size:1.1rem;font-weight:600;margin-bottom:3px;color:var(--coin-gold)}
        .cert-issuer{font-size:.75rem;color:var(--text-secondary);margin-bottom:2px}
        .cert-date{font-size:.65rem;color:var(--text-secondary);margin-bottom:10px}
        .cert-code{
            background:rgba(200,150,50,.08);border:1px dashed rgba(200,150,50,.4);
            padding:6px 14px;border-radius:10px;font-family:monospace;font-size:.8rem;
            color:var(--coin-gold);display:inline-block;margin-bottom:10px;
        }
        .cert-verify-btn{
            background:var(--coin-gold);color:#0f172a;border:0;padding:7px 18px;
            border-radius:18px;font-weight:600;cursor:pointer;font-size:.75rem;font-family:inherit;
        }
        .cert-verify-btn:hover{opacity:.85}
        .cert-actions{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
        .btn-outline-gold{
            background:transparent;border:1px solid rgba(200,150,50,.4);
            color:var(--coin-gold);padding:5px 12px;border-radius:18px;
            font-size:.7rem;cursor:pointer;font-family:inherit;transition:var(--transition);
        }
        .btn-outline-gold:hover{background:rgba(200,150,50,.1)}

        /* ============ AUDIO ROOMS ============ */
        .live-now{border-color:rgba(239,68,68,.4)}
        .live-badge{
            background:rgba(239,68,68,.2);color:#f87171;padding:2px 8px;
            border-radius:10px;font-size:.6rem;font-weight:600;
        }
        .room-card{
            background:rgba(30,41,59,.4);border:1px solid var(--estra-border);
            border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:var(--transition);
        }
        .room-card:hover{border-color:var(--estra-cyan)}
        .room-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .room-topic{font-weight:600;font-size:.95rem}
        .room-host{display:flex;align-items:center;gap:8px;margin-bottom:8px}
        .room-host-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover}
        .room-host-name{font-size:.75rem;color:var(--estra-cyan)}
        .room-stats{display:flex;gap:14px;font-size:.7rem;color:var(--text-secondary)}
        .room-speakers{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
        .speaker-bubble{
            display:flex;align-items:center;gap:5px;background:rgba(56,189,248,.06);
            padding:3px 9px;border-radius:16px;font-size:.65rem;
        }
        .speaker-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover}
        .speaker-muted{opacity:.4}
        .btn-create-room{
            background:var(--estra-cyan);color:#0f172a;border:0;padding:10px 20px;
            border-radius:25px;font-weight:600;cursor:pointer;font-size:.8rem;
            font-family:inherit;width:100%;margin-top:10px;transition:var(--transition);
        }
        .btn-create-room:hover{opacity:.85}

        /* ROOM VIEWER */
        .room-viewer{position:fixed;inset:0;background:#0f172a;z-index:200;display:none;flex-direction:column}
        .room-viewer.active{display:flex}
        .room-viewer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--estra-border)}
        .room-viewer-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
        .stage-speaker{text-align:center}
        .stage-speaker-avatar{width:70px;height:70px;border-radius:50%;border:2px solid var(--estra-success);object-fit:cover}
        .stage-speaker-name{font-weight:600;margin-top:6px;font-size:.9rem}
        .room-viewer-footer{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 18px;border-top:1px solid var(--estra-border)}
        .room-control-btn{width:44px;height:44px;border-radius:50%;border:0;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
        .btn-mic{background:rgba(30,41,59,.6);color:var(--text-secondary)}
        .btn-mic.muted{background:rgba(239,68,68,.3);color:#f87171}
        .btn-leave-room{background:rgba(239,68,68,.3);color:#f87171;width:50px;height:50px}
        .btn-raise-hand{background:rgba(30,41,59,.6);color:var(--text-secondary)}
        .btn-raise-hand.raised{background:rgba(200,150,50,.3);color:var(--coin-gold)}

        /* ============ NOTES ============ */
        .notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
        .note-card{
            background:rgba(30,41,59,.4);border:1px solid var(--estra-border);
            border-radius:10px;padding:12px;cursor:pointer;transition:var(--transition);
        }
        .note-card:hover{border-color:var(--estra-cyan)}
        .note-title{font-weight:600;font-size:.85rem;margin-bottom:2px}
        .note-preview{font-size:.7rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .note-meta{display:flex;gap:10px;font-size:.6rem;color:var(--text-secondary);margin-top:4px}
        .note-course-tag{background:rgba(167,139,250,.1);color:var(--estra-purple);padding:1px 7px;border-radius:8px;font-size:.55rem}
        .note-editor{background:rgba(30,41,59,.4);border:1px solid var(--estra-border);border-radius:14px;padding:14px}
        .note-editor input{width:100%;background:none;border:0;color:var(--text-primary);font-size:1rem;font-weight:600;outline:0;margin-bottom:10px;font-family:inherit}
        .note-editor textarea{width:100%;min-height:180px;background:none;border:0;color:var(--text-primary);outline:0;font-size:.85rem;resize:vertical;font-family:inherit;line-height:1.5}
        .note-editor-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(51,65,85,.3)}
        .note-editor-actions{display:flex;gap:6px;flex-wrap:wrap}
        .btn-sm{
            background:rgba(30,41,59,.5);border:1px solid var(--estra-border);
            color:var(--text-secondary);padding:5px 10px;border-radius:16px;
            font-size:.65rem;cursor:pointer;font-family:inherit;transition:var(--transition);
            display:flex;align-items:center;gap:3px;
        }
        .btn-sm:hover{background:rgba(56,189,248,.08);color:var(--estra-cyan)}
        .btn-save{background:var(--estra-cyan);color:#0f172a;border:0}
        .btn-save:hover{opacity:.85}
        .word-count{font-size:.6rem;color:var(--text-secondary)}

        /* MODALS */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center}
        .modal-overlay.active{display:flex}
        .modal-content{background:#1e293b;width:90%;max-width:480px;max-height:85vh;overflow-y:auto;border-radius:20px;padding:22px;border:1px solid var(--estra-border)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        .modal-header h3{font-size:1rem;display:flex;align-items:center;gap:6px}
        .modal-close{background:none;border:0;color:var(--text-secondary);font-size:24px;cursor:pointer;transition:var(--transition)}
        .modal-close:hover{color:#f87171}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;margin-bottom:4px;font-weight:500;font-size:.75rem;color:var(--text-secondary)}
        .form-group input,.form-group select,.form-group textarea{
            width:100%;padding:9px 12px;background:#0f172a;
            border:1px solid rgba(51,65,85,.4);border-radius:10px;
            color:var(--text-primary);outline:0;font-size:.85rem;font-family:inherit;
        }
        .form-group textarea{min-height:70px;resize:vertical}
        .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
        .btn-cancel{background:#334155;border:1px solid rgba(51,65,85,.4);padding:8px 18px;border-radius:25px;color:var(--text-secondary);cursor:pointer;font-weight:500;font-family:inherit;font-size:.8rem}
        .btn-submit{background:var(--estra-cyan);color:#0f172a;border:0;padding:8px 18px;border-radius:25px;cursor:pointer;font-weight:600;font-family:inherit;font-size:.8rem}
        .btn-submit:hover{opacity:.85}

        /* TOAST */
        .toast-custom{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:9px 18px;z-index:400;font-size:.75rem;border-radius:20px;border:1px solid var(--estra-border);white-space:nowrap;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
        .toast-custom.show{opacity:1;visibility:visible}

        .empty-state{text-align:center;padding:35px 16px;color:var(--text-secondary)}
        .d-flex{display:flex}.align-items-center{align-items:center}.gap-2{gap:8px}
        @media(max-width:768px){.tabs-container{overflow-x:auto}.tab-btn{font-size:.7rem}}
    </style>
</head>
<body>
<nav class="navbar">
    <div style="display:flex;align-items:center;gap:10px">
        <button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
        <a href="index.html" class="navbar-brand">ESTRA LINK</a>
    </div>
    <div class="nav-actions">
        <button class="btn-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i> Profil</button>
    </div>
</nav>

<div class="tabs-container">
    <button class="tab-btn active" onclick="switchMainTab('certifications',this)"><i class="fas fa-medal"></i>Certifications</button>
    <button class="tab-btn" onclick="switchMainTab('audio',this)"><i class="fas fa-microphone"></i>Live Audio</button>
    <button class="tab-btn" onclick="switchMainTab('notes',this)"><i class="fas fa-pencil-alt"></i>Notes</button>
</div>

<!-- CERTIFICATIONS -->
<div class="tab-content active" id="tab-certifications">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3 style="font-size:.95rem;font-weight:600">🏅 Mes Certifications</h3>
        <button class="btn-sm" onclick="openVerifyCertModal()"><i class="fas fa-search"></i> Vérifier</button>
    </div>
    <div id="certificationsList"></div>
    <div style="text-align:center;margin-top:16px">
        <button class="btn-submit" onclick="openRequestCertModal()"><i class="fas fa-plus"></i> Demander une certification</button>
    </div>
</div>

<!-- AUDIO ROOMS -->
<div class="tab-content" id="tab-audio">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3 style="font-size:.95rem;font-weight:600">🎤 Salons Audio</h3>
        <span style="font-size:.7rem;color:var(--text-secondary)" id="onlineListeners">0 auditeurs</span>
    </div>
    <div id="roomsList"></div>
    <button class="btn-create-room" onclick="openCreateRoomModal()"><i class="fas fa-plus-circle"></i> Créer un salon audio</button>
</div>

<!-- ROOM VIEWER -->
<div class="room-viewer" id="roomViewer">
    <div class="room-viewer-header">
        <div>
            <div style="font-weight:600;font-size:.85rem" id="roomViewerTopic">Salon Audio</div>
            <div style="font-size:.65rem;color:var(--text-secondary)"><span id="roomViewerListeners">0</span> auditeurs</div>
        </div>
        <span class="live-badge">🔴 LIVE</span>
    </div>
    <div class="room-viewer-stage">
        <div class="stage-speaker">
            <img src="" class="stage-speaker-avatar" id="stageSpeakerAvatar" alt="Speaker">
            <div class="stage-speaker-name" id="stageSpeakerName"></div>
            <div style="font-size:.65rem;color:var(--text-secondary);margin-top:3px">En train de parler...</div>
        </div>
        <div style="font-size:.75rem;color:var(--text-secondary)">👋 Levez la main pour intervenir</div>
    </div>
    <div class="room-viewer-footer">
        <button class="room-control-btn btn-mic" id="btnMic" onclick="toggleMic()">🎙️</button>
        <button class="room-control-btn btn-raise-hand" id="btnRaiseHand" onclick="toggleRaiseHand()">✋</button>
        <button class="room-control-btn btn-leave-room" onclick="leaveRoom()">✕</button>
    </div>
</div>

<!-- NOTES -->
<div class="tab-content" id="tab-notes">
    <div class="notes-header">
        <h3 style="font-size:.95rem;font-weight:600">📝 Mes Notes</h3>
        <button class="btn-sm" onclick="createNewNote()"><i class="fas fa-plus"></i> Nouvelle</button>
    </div>
    <div id="notesList"></div>
    <div id="noteEditor" class="note-editor" style="display:none">
        <input type="text" id="noteTitle" placeholder="Titre de la note...">
        <div style="margin-bottom:8px">
            <select id="noteCourse" style="background:#0f172a;border:1px solid rgba(51,65,85,.4);border-radius:8px;padding:5px 8px;color:var(--text-primary);font-size:.7rem;font-family:inherit;max-width:100%">
                <option value="">Sans cours associé</option>
            </select>
        </div>
        <textarea id="noteContent" placeholder="Commencez à écrire..." oninput="updateWordCount()"></textarea>
        <div class="note-editor-footer">
            <div class="note-editor-actions">
                <button class="btn-sm" onclick="formatNote('bold')"><b>G</b></button>
                <button class="btn-sm" onclick="formatNote('italic')"><i>I</i></button>
                <button class="btn-sm" onclick="formatNote('list')">• Liste</button>
                <button class="btn-sm" onclick="exportNote()">📄 Exporter</button>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
                <span class="word-count" id="wordCount">0 mots</span>
                <button class="btn-sm btn-save" onclick="saveNote()">💾 Enregistrer</button>
            </div>
        </div>
    </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="verifyCertModal">
    <div class="modal-content">
        <div class="modal-header"><h3>🔍 Vérifier une certification</h3><button class="modal-close" onclick="closeModal('verifyCertModal')">&times;</button></div>
        <div class="form-group"><label>Code de certification</label><input type="text" id="verifyCertCode" placeholder="Ex: ESTRA-2026-XXXX-XXXX"></div>
        <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('verifyCertModal')">Annuler</button><button class="btn-submit" onclick="verifyCertification()">Vérifier</button></div>
        <div id="verifyResult" style="margin-top:14px;text-align:center"></div>
    </div>
</div>
<div class="modal-overlay" id="requestCertModal">
    <div class="modal-content">
        <div class="modal-header"><h3>📜 Demander une certification</h3><button class="modal-close" onclick="closeModal('requestCertModal')">&times;</button></div>
        <div class="form-group"><label>Type</label><select id="reqCertType"><option value="course">Certificat de cours</option><option value="mentorship">Attestation de mentorat</option><option value="skill">Certification de compétence</option></select></div>
        <div class="form-group"><label>Émetteur</label><input type="text" id="reqCertIssuer" placeholder="Nom du mentor ou professeur"></div>
        <div class="form-group"><label>Description</label><textarea id="reqCertDesc" placeholder="Décrivez la certification..."></textarea></div>
        <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('requestCertModal')">Annuler</button><button class="btn-submit" onclick="requestCertification()">Demander</button></div>
    </div>
</div>
<div class="modal-overlay" id="createRoomModal">
    <div class="modal-content">
        <div class="modal-header"><h3>🎤 Créer un salon audio</h3><button class="modal-close" onclick="closeModal('createRoomModal')">&times;</button></div>
        <div class="form-group"><label>Sujet *</label><input type="text" id="roomTopic" placeholder="Ex: Révision Physique"></div>
        <div class="form-group"><label>Catégorie</label><select id="roomCategory"><option value="education">📚 Éducation</option><option value="business">💼 Business</option><option value="tech">💻 Tech</option><option value="social">🎉 Social</option></select></div>
        <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('createRoomModal')">Annuler</button><button class="btn-submit" onclick="createRoom()">Lancer</button></div>
    </div>
</div>
<div id="toastMsg" class="toast-custom"></div>

<script>
let currentUser={name:'Rashidi',avatar:'https://ui-avatars.com/api/?background=38bdf8&color=fff&name=Rashidi&size=80'};
let certifications=[],audioRooms=[],notes=[],currentMainTab='certifications',currentNoteId=null,activeRoom=null,micMuted=true,handRaised=false,toastTimeout=null;

function $(id){return document.getElementById(id)}
function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showToast(msg){const t=$('toastMsg');if(!t)return;if(toastTimeout)clearTimeout(toastTimeout);t.textContent=msg;t.classList.remove('show');void t.offsetWidth;t.classList.add('show');toastTimeout=setTimeout(()=>t.classList.remove('show'),3000)}
function formatDate(ts){const d=new Date(ts);return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
function generateCertCode(){return'ESTRA-'+new Date().getFullYear()+'-'+Math.random().toString(36).substring(2,8).toUpperCase()+'-'+Math.random().toString(36).substring(2,6).toUpperCase()}

function loadData(){
    const sp=localStorage.getItem('estra_profile');if(sp){try{const p=JSON.parse(sp);currentUser.name=p.fullName||currentUser.name;currentUser.avatar=p.avatar||currentUser.avatar}catch(e){}}
    certifications=JSON.parse(localStorage.getItem('estra_certifications')||'[]');
    audioRooms=JSON.parse(localStorage.getItem('estra_audio_rooms')||'[]');
    notes=JSON.parse(localStorage.getItem('estra_notes')||'[]');
    if(!certifications.length){certifications=[{id:'cert1',type:'course',title:'Python pour Data Science',issuer:'David Mwamba',recipient:currentUser.name,code:'ESTRA-2026-A7B3F2-X9K1',date:Date.now()-86400000*30,verified:!0},{id:'cert2',type:'mentorship',title:'Attestation de Mentorat - Programmation Web',issuer:'Marie Claire',recipient:currentUser.name,code:'ESTRA-2026-C2D8E4-M5P7',date:Date.now()-86400000*60,verified:!0}];localStorage.setItem('estra_certifications',JSON.stringify(certifications))}
    if(!audioRooms.length){audioRooms=[{id:'room1',topic:'Révision Examen Physique',host:'Prof. Kalenga',hostAvatar:'https://ui-avatars.com/api/?background=f59e0b&color=fff&name=Prof&size=40',category:'education',listeners:12,speakers:[{name:'Prof. Kalenga',avatar:'https://ui-avatars.com/api/?background=f59e0b&color=fff&name=Prof&size=24',speaking:!0}],isLive:!0,createdAt:Date.now()-1800000}]}
    if(!notes.length){notes=[{id:'note1',title:'Résumé Chapitre 3 - Réseaux',content:'Modèle OSI : 7 couches...\n\nCouche 1 : Physique\nCouche 2 : Liaison\nCouche 3 : Réseau\n...',courseId:null,courseName:'',wordCount:15,createdAt:Date.now()-86400000,updatedAt:Date.now()-3600000}]}
    renderAll();
}
function saveAll(){localStorage.setItem('estra_certifications',JSON.stringify(certifications));localStorage.setItem('estra_audio_rooms',JSON.stringify(audioRooms));localStorage.setItem('estra_notes',JSON.stringify(notes))}

function switchMainTab(tab,btn){
    currentMainTab=tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    const tc=$('tab-'+tab);if(tc)tc.classList.add('active');
    renderAll();
}
function renderAll(){renderCertifications();renderRooms();renderNotes();const ol=$('onlineListeners');if(ol)ol.textContent=audioRooms.reduce((s,r)=>s+(r.listeners||0),0)+' auditeurs'}

// ============ CERTIFICATIONS ============
function renderCertifications(){
    const c=$('certificationsList');if(!c)return;
    if(!certifications.length){c.innerHTML='<div class="empty-state"><i class="fas fa-medal" style="font-size:2.5rem;margin-bottom:12px;display:block;opacity:.5"></i><p>Aucune certification</p></div>';return}
    c.innerHTML=certifications.map(cert=>`<div class="cert-card"><div class="cert-ribbon">VÉRIFIÉ</div><div class="cert-icon">${cert.type==='course'?'📚':cert.type==='mentorship'?'🤝':'⭐'}</div><div class="cert-title">${escapeHtml(cert.title)}</div><div class="cert-issuer">Délivré par <strong>${escapeHtml(cert.issuer)}</strong></div><div class="cert-date">${formatDate(cert.date)}</div><div class="cert-code">🔑 ${cert.code}</div><div class="cert-actions"><button class="cert-verify-btn" onclick="showVerifyResult('${cert.code}','${escapeHtml(cert.issuer)}','${escapeHtml(cert.title)}')">✅ Vérifier</button><button class="btn-outline-gold" onclick="shareCertification('${cert.code}','${escapeHtml(cert.title)}')">📤</button><button class="btn-outline-gold" onclick="downloadCertification('${cert.id}')">⬇️</button></div></div>`).join('');
}
function openVerifyCertModal(){const m=$('verifyCertModal');if(m)m.classList.add('active')}
function verifyCertification(){
    const code=$('verifyCertCode')?.value.trim(),result=$('verifyResult');
    if(!code){if(result)result.innerHTML='<p style="color:#f87171">Veuillez entrer un code</p>';return}
    const cert=certifications.find(c=>c.code===code);
    if(result){if(cert){result.innerHTML=`<div style="color:var(--estra-success)"><i class="fas fa-check-circle" style="font-size:1.8rem"></i><p style="margin-top:6px"><strong>${escapeHtml(cert.title)}</strong></p><p style="font-size:.8rem">Délivré par ${escapeHtml(cert.issuer)}</p><p style="font-size:.8rem">À ${escapeHtml(cert.recipient)}</p><p style="color:var(--coin-gold);font-size:.8rem">✅ Certification valide</p></div>`}else{result.innerHTML='<p style="color:#f87171">❌ Code invalide</p>'}}
}
function showVerifyResult(code,issuer,title){const inp=$('verifyCertCode');if(inp)inp.value=code;verifyCertification();const m=$('verifyCertModal');if(m)m.classList.add('active')}
function shareCertification(code,title){navigator.clipboard?.writeText(`🏅 Certification ESTRA LINK : ${title}\nCode : ${code}`).then(()=>showToast('📋 Copié !'))}
function downloadCertification(id){const c=certifications.find(x=>x.id===id);if(c){const cv=document.createElement('canvas');cv.width=700;cv.height=400;const ctx=cv.getContext('2d');ctx.fillStyle='#1e293b';ctx.fillRect(0,0,700,400);ctx.strokeStyle='#c9952e';ctx.lineWidth=3;ctx.strokeRect(15,15,670,370);ctx.fillStyle='#c9952e';ctx.font='bold 26px Segoe UI';ctx.fillText('ESTRA LINK',250,70);ctx.fillStyle='#e2e8f0';ctx.font='18px Segoe UI';ctx.fillText(c.title,180,130);ctx.fillText('Délivré par : '+c.issuer,180,170);ctx.fillText('À : '+c.recipient,180,210);ctx.fillStyle='#c9952e';ctx.font='13px monospace';ctx.fillText('Code : '+c.code,180,260);const a=document.createElement('a');a.href=cv.toDataURL();a.download=`certification_${c.id}.png`;a.click();showToast('🖼️ Téléchargé')}}
function openRequestCertModal(){const m=$('requestCertModal');if(m)m.classList.add('active')}
function requestCertification(){
    const type=$('reqCertType')?.value,issuer=$('reqCertIssuer')?.value.trim(),desc=$('reqCertDesc')?.value.trim();
    if(!issuer||!desc){showToast('Remplissez tous les champs');return}
    certifications.push({id:'cert_'+Date.now(),type,title:desc.substring(0,50),issuer,recipient:currentUser.name,code:generateCertCode(),date:Date.now(),verified:!0});
    saveAll();renderAll();closeModal('requestCertModal');
    const notifs=JSON.parse(localStorage.getItem('estra_notifications')||'[]');
    notifs.unshift({id:Date.now(),type:'certification',user:currentUser.name,content:`a reçu une certification : ${desc.substring(0,30)}`,time:Date.now(),read:!1});
    localStorage.setItem('estra_notifications',JSON.stringify(notifs.slice(0,50)));
    showToast('🏅 Certification créée !');
}

// ============ AUDIO ROOMS ============
function renderRooms(){
    const c=$('roomsList');if(!c)return;
    const live=audioRooms.filter(r=>r.isLive),past=audioRooms.filter(r=>!r.isLive);
    if(!audioRooms.length){c.innerHTML='<div class="empty-state"><i class="fas fa-microphone" style="font-size:2.5rem;margin-bottom:12px;display:block;opacity:.5"></i><p>Aucun salon audio</p></div>';return}
    let h='';
    if(live.length){h+='<div style="font-weight:600;color:#f87171;font-size:.75rem;margin-bottom:6px">🔴 EN DIRECT ('+live.length+')</div>';live.forEach(r=>{h+=`<div class="room-card live-now" onclick="joinRoom('${r.id}')"><div class="room-header"><span class="room-topic">${escapeHtml(r.topic)}</span><span class="live-badge">LIVE</span></div><div class="room-host"><img src="${r.hostAvatar}" class="room-host-avatar" alt="Host"><span class="room-host-name">${escapeHtml(r.host)}</span></div><div class="room-stats"><span>👥 ${r.listeners||0} auditeurs</span><span>🎙️ ${(r.speakers||[]).length} intervenants</span></div><div class="room-speakers">${(r.speakers||[]).slice(0,5).map(s=>`<div class="speaker-bubble ${s.speaking?'':'speaker-muted'}"><img src="${s.avatar}" class="speaker-avatar" alt="Speaker">${escapeHtml(s.name)}</div>`).join('')}</div></div>`})}
    if(past.length){h+='<div style="font-weight:600;color:var(--text-secondary);font-size:.75rem;margin:10px 0 6px">📼 Terminés</div>';past.forEach(r=>{h+=`<div class="room-card"><div class="room-header"><span class="room-topic">${escapeHtml(r.topic)}</span></div><div class="room-host"><img src="${r.hostAvatar}" class="room-host-avatar" alt="Host"><span class="room-host-name">${escapeHtml(r.host)}</span></div></div>`})}
    c.innerHTML=h;
}
function openCreateRoomModal(){const m=$('createRoomModal');if(m)m.classList.add('active')}
function createRoom(){
    const topic=$('roomTopic')?.value.trim(),category=$('roomCategory')?.value;
    if(!topic){showToast('Donnez un sujet');return}
    const nr={id:'room_'+Date.now(),topic,category,host:currentUser.name,hostAvatar:currentUser.avatar,listeners:1,speakers:[{name:currentUser.name,avatar:currentUser.avatar,speaking:!0}],isLive:!0,createdAt:Date.now()};
    audioRooms.unshift(nr);saveAll();renderAll();closeModal('createRoomModal');
    const notifs=JSON.parse(localStorage.getItem('estra_notifications')||'[]');
    notifs.unshift({id:Date.now(),type:'audio_room',user:currentUser.name,content:`a lancé un salon : "${topic}"`,time:Date.now(),read:!1});
    localStorage.setItem('estra_notifications',JSON.stringify(notifs.slice(0,50)));
    showToast('🎤 Salon lancé !');joinRoom(nr.id);
}
function joinRoom(rid){
    const room=audioRooms.find(r=>r.id===rid);if(!room)return;
    activeRoom=room;room.listeners=(room.listeners||0)+1;saveAll();
    $('roomViewerTopic').textContent=room.topic;$('roomViewerListeners').textContent=room.listeners;
    const sp=room.speakers[0];$('stageSpeakerAvatar').src=sp?.avatar||'';$('stageSpeakerName').textContent=sp?.name||'';
    $('roomViewer').classList.add('active');document.body.style.overflow='hidden';
    micMuted=!0;handRaised=!1;$('btnMic').classList.add('muted');$('btnRaiseHand').classList.remove('raised');
}
function leaveRoom(){
    if(activeRoom){activeRoom.listeners=Math.max(0,(activeRoom.listeners||1)-1);activeRoom.speakers=activeRoom.speakers.filter(s=>s.name!==currentUser.name);saveAll();renderAll()}
    $('roomViewer').classList.remove('active');document.body.style.overflow='';activeRoom=null;
}
function toggleMic(){
    micMuted=!micMuted;const btn=$('btnMic');btn.classList.toggle('muted',micMuted);btn.textContent=micMuted?'🎙️':'🔊';
    if(activeRoom){const sp=activeRoom.speakers.find(s=>s.name===currentUser.name);if(sp)sp.speaking=!micMuted;saveAll()}
    showToast(micMuted?'🔇 Micro coupé':'🎙️ Vous parlez');
}
function toggleRaiseHand(){handRaised=!handRaised;$('btnRaiseHand').classList.toggle('raised',handRaised);showToast(handRaised?'✋ Main levée':'✋ Main baissée')}

// ============ NOTES ============
function renderNotes(){
    const c=$('notesList');if(!c||currentMainTab!=='notes')return;
    if(!notes.length){c.innerHTML='<div class="empty-state"><i class="fas fa-pencil-alt" style="font-size:2.5rem;margin-bottom:12px;display:block;opacity:.5"></i><p>Aucune note</p></div>';return}
    notes.sort((a,b)=>b.updatedAt-a.updatedAt);
    c.innerHTML=notes.map(n=>`<div class="note-card" onclick="openNote('${n.id}')"><div class="note-title">${escapeHtml(n.title||'Sans titre')}</div><div class="note-preview">${escapeHtml((n.content||'').substring(0,80))}...</div><div class="note-meta"><span>${formatDate(n.updatedAt)}</span><span>${n.wordCount||0} mots</span>${n.courseName?`<span class="note-course-tag">${escapeHtml(n.courseName)}</span>`:''}</div></div>`).join('');
}
function createNewNote(){currentNoteId=null;$('noteTitle').value='';$('noteContent').value='';$('notesList').style.display='none';$('noteEditor').style.display='block';loadCourseOptions();updateWordCount()}
function openNote(id){
    const n=notes.find(x=>x.id===id);if(!n)return;
    currentNoteId=id;$('noteTitle').value=n.title||'';$('noteContent').value=n.content||'';
    $('notesList').style.display='none';$('noteEditor').style.display='block';loadCourseOptions();updateWordCount();
    const cs=$('noteCourse');if(cs)cs.value=n.courseId||'';
}
function loadCourseOptions(){
    const courses=JSON.parse(localStorage.getItem('estra_courses')||'[]'),sel=$('noteCourse');
    if(!sel)return;sel.innerHTML='<option value="">Sans cours associé</option>'+courses.map(c=>`<option value="${c.id}">${escapeHtml(c.title)}</option>`).join('');
}
function updateWordCount(){
    const content=$('noteContent')?.value||'',count=content.trim()?content.trim().split(/\s+/).length:0,wc=$('wordCount');
    if(wc)wc.textContent=count+' mot'+(count>1?'s':'');
}
function saveNote(){
    const title=$('noteTitle')?.value.trim()||'Sans titre',content=$('noteContent')?.value||'';
    const courseId=$('noteCourse')?.value||'',courses=JSON.parse(localStorage.getItem('estra_courses')||'[]');
    const course=courses.find(c=>c.id==courseId),wordCount=content.trim()?content.trim().split(/\s+/).length:0;
    if(currentNoteId){const n=notes.find(x=>x.id===currentNoteId);if(n){n.title=title;n.content=content;n.courseId=courseId;n.courseName=course?.title||'';n.wordCount=wordCount;n.updatedAt=Date.now()}}
    else{notes.unshift({id:'note_'+Date.now(),title,content,courseId,courseName:course?.title||'',wordCount,createdAt:Date.now(),updatedAt:Date.now()})}
    saveAll();renderAll();$('notesList').style.display='block';$('noteEditor').style.display='none';showToast('💾 Note enregistrée');
}
function formatNote(type){
    const ta=$('noteContent');if(!ta)return;const s=ta.selectionStart,e=ta.selectionEnd,t=ta.value;
    let r='';if(type==='bold')r='**'+t.substring(s,e)+'**';else if(type==='italic')r='*'+t.substring(s,e)+'*';else if(type==='list')r='\n• '+t.substring(s,e);
    ta.value=t.substring(0,s)+r+t.substring(e);ta.focus();updateWordCount();
}
function exportNote(){
    const title=$('noteTitle')?.value||'Note',content=$('noteContent')?.value||'';
    const blob=new Blob([`${title}\n\n${content}`],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=title.replace(/\s+/g,'_')+'.txt';a.click();showToast('📄 Exporté');
}
function closeModal(id){const m=$(id);if(m)m.classList.remove('active')}

document.addEventListener('DOMContentLoaded',()=>{
    loadData();
    window.addEventListener('storage',e=>{if(['estra_certifications','estra_audio_rooms','estra_notes'].includes(e.key))loadData()});
});

window.switchMainTab=switchMainTab;window.renderAll=renderAll;
window.openVerifyCertModal=openVerifyCertModal;window.verifyCertification=verifyCertification;
window.showVerifyResult=showVerifyResult;window.shareCertification=shareCertification;
window.downloadCertification=downloadCertification;window.openRequestCertModal=openRequestCertModal;
window.requestCertification=requestCertification;
window.renderRooms=renderRooms;window.openCreateRoomModal=openCreateRoomModal;
window.createRoom=createRoom;window.joinRoom=joinRoom;window.leaveRoom=leaveRoom;
window.toggleMic=toggleMic;window.toggleRaiseHand=toggleRaiseHand;
window.renderNotes=renderNotes;window.createNewNote=createNewNote;window.openNote=openNote;
window.saveNote=saveNote;window.formatNote=formatNote;window.exportNote=exportNote;
window.updateWordCount=updateWordCount;window.closeModal=closeModal;window.showToast=showToast;
</script>
</body>
</html>
