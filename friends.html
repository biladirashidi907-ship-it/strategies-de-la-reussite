<script>
// ============ CANAL DE COMMUNICATION TEMPS RÉEL ============
const ESTRA_CHANNEL = new BroadcastChannel('estra_network');
ESTRA_CHANNEL.onmessage = (e) => {
    const { type, data } = e.data;
    if (type === 'friends_updated' || type === 'badges_updated' || type === 'profile_updated' || type === 'blocked_updated') {
        loadAllData();
        renderCurrentList();
        updateSidebarStats();
        updateRightPanelStats();
    }
};
function estraEmit(type, data = {}) {
    ESTRA_CHANNEL.postMessage({ type, data, timestamp: Date.now() });
}

// ============ BASE DE DONNÉES ============
if(typeof ESTRA === 'undefined') {
    window.ESTRA = {
        ROLES: { STUDENT: 'student', HIGHSCHOOL: 'highschool', PROFESSOR: 'professor', TEACHER: 'teacher', SIMPLE: 'simple', ADMIN: 'admin' },
        isLoggedIn: () => localStorage.getItem('estra_logged_in') === 'true',
        getProfile: () => JSON.parse(localStorage.getItem('estra_profile')) || { accountType: 'student', fullName: 'Utilisateur', username: 'user' },
        updateProfile: (p) => {
            const current = ESTRA.getProfile() || {};
            localStorage.setItem('estra_profile', JSON.stringify({ ...current, ...p }));
        },
        logout: () => {
            localStorage.setItem('estra_logged_in', 'false');
            window.location.href = 'login.html'; 
        }
    };
}

// ============ BADGES (VERSION ADMIN AVEC HIÉRARCHIE) ============
function getAllBadges() {
    return JSON.parse(localStorage.getItem('estra_badges') || '[]');
}

function getUserBadges(username) {
    if (!username) return [];
    const users = JSON.parse(localStorage.getItem('estra_all_users') || '[]');
    const user = users.find(u => u.username === username || u.fullName === username);
    return user?.badges || [];
}

function renderUserBadges(badges) {
    if (!badges || badges.length === 0) return '';
    const allBadges = getAllBadges();
    
    // Hiérarchie des badges (un seul avec libellé)
    const badgesWithStyle = ['sponsor', 'partner', 'mentor', 'premium', 'teacher', 'recruiter'];
    
    // Séparer les badges avec libellé et sans libellé
    const withLabel = [];
    const withoutLabel = [];
    
    badges.forEach(badgeId => {
        const b = allBadges.find(item => item.id === badgeId);
        if (!b) return;
        if (badgesWithStyle.includes(b.id) && b.display !== 'icon') {
            withLabel.push(b);
        } else {
            withoutLabel.push(b);
        }
    });
    
    // Trier les badges avec libellé par priorité (sponsor > partner > mentor > premium > teacher > recruiter)
    const priority = { sponsor: 1, partner: 2, mentor: 3, premium: 4, teacher: 5, recruiter: 6 };
    withLabel.sort((a, b) => (priority[a.id] || 99) - (priority[b.id] || 99));
    
    // Garder UNIQUEMENT le badge avec la plus haute priorité (le premier)
    const mainBadge = withLabel.length > 0 ? withLabel[0] : null;
    
    let html = '';
    if (mainBadge) {
        const style = `color:${mainBadge.color}; background:${mainBadge.color}20; border:1px solid ${mainBadge.color}40; padding:3px 10px; border-radius:15px; font-size:0.65rem; font-weight:700; display:inline-flex; align-items:center; gap:4px; margin:0 2px;`;
        html += `<span class="badge-pill" style="${style}"><i class="fas ${mainBadge.icon}"></i> ${mainBadge.name}</span>`;
    }
    
    // Ajouter les badges sans libellé (icônes seules)
    withoutLabel.forEach(b => {
        html += `<span class="badge-pill icon-only" style="color:${b.color}; font-size:0.8rem; margin:0 2px; display:inline-flex; align-items:center; gap:3px;" title="${b.desc || b.name}"><i class="fas ${b.icon}"></i></span>`;
    });
    
    return html;
}

function syncAllUsersToDatabase() {
    const users = JSON.parse(localStorage.getItem('estra_all_users') || '[]');
    let updated = false;
    function addIfNotExists(person) {
        if (!person || !person.name) return;
        const username = person.username || person.name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        const exists = users.find(u => u.username === username || u.fullName === person.name);
        if (!exists) {
            users.push({
                id: username, username: username, fullName: person.name, bio: person.bio || '',
                email: person.email || '', location: person.location || 'RDC',
                avatar: person.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(person.name)}&background=random&color=fff`,
                cover: person.cover || null, verified: person.verified || false,
                joinDate: person.joinDate || '2026', accountType: person.accountType || 'student',
                companyVisibility: person.companyVisibility || 'public', domain: person.domain || '', level: person.level || '', badges: person.badges || []
            });
            updated = true;
        }
    }
    friends.forEach(f => addIfNotExists(f));
    binomes.forEach(b => addIfNotExists(b));
    suggestions.forEach(s => addIfNotExists(s));

function enrichWithUserData(items) {
    const allUsers = getAllUsers();
    return items.map(item => {
        const user = allUsers.find(u => u.username === item.username || u.fullName === item.name);
        if (user) {
            return {
                ...item,
                badges: user.badges || [],
                blocked: user.blocked || false,
                accountType: user.accountType || 'simple',
                verified: user.verified || item.verified || false,
                fullUser: user
            };
        }
        return { ...item, badges: [], blocked: false, accountType: 'simple' };
    });
}

            { id: 'b2', name: 'Jean Mutombo', username: 'jean_mutombo', avatar: 'https://ui-avatars.com/api/?name=Jean&background=6366f1&color=fff', bio: 'Étudiant en Droit | Spécialisation Droit des affaires', domain: 'Droit', level: 'L2', commonCourses: 'Droit des contrats', commonUniversity: 'Université de Kinshasa', commonPromotion: '2024-2025', online: true, favorite: false, type: 'binome', joinDate: 'Février 2025', location: 'Kinshasa, RDC' }

    const allSuggestions = allUsers.filter(u => u.username !== currentUser.username && !existingNames.includes(u.fullName) && !hiddenSuggestions.includes(u.id));
    let filteredSuggestions = allSuggestions;
    if (currentUser.domain && currentUser.domain !== '') {
        const binomeCandidates = allSuggestions.filter(u => u.domain === currentUser.domain && u.accountType === 'student');
        const amiCandidates = allSuggestions.filter(u => u.domain !== currentUser.domain || u.accountType !== 'student');

// ============ FONCTIONS DE RENDU ============
let currentMainTab = 'suggestions';
let currentSubTab = 'ami';

function renderCard(person, mode) {
    const type = person.type || 'ami';
    const verifiedIcon = person.verified ? ' <i class="fas fa-check-circle" style="color:#1DA1F2;font-size:0.7rem;"></i>' : '';
    let tagHtml = '';
    if (mode === 'relation') {
        const tagLabel = type === 'binome' ? 'Binôme' : 'Suivi(e)';
        const tagClass = type === 'binome' ? 'binome' : 'ami';
        tagHtml = `<span class="person-tag ${tagClass}">${tagLabel}</span>`;
    }
    const onlineDot = (person.online !== undefined) ? `<span class="online-dot ${person.online ? '' : 'offline'}" style="${person.online ? '' : 'background:#94a3b8;'}"></span>` : '';

    // Badges utilisateur (version admin avec hiérarchie)
    const badgesHtml = renderUserBadges(person.badges || []);

    const blockedHtml = person.blocked ? `<span class="blocked-indicator"><i class="fas fa-ban"></i> Bloqué</span>` : '';

    let detailsHtml = '';
    if (person.domain) detailsHtml += `<span><i class="fas fa-graduation-cap"></i> ${escapeHtml(person.domain)}${person.level ? ' ('+escapeHtml(person.level)+')' : ''}</span>`;
    if (person.location) detailsHtml += `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(person.location)}</span>`;
    if (person.joinDate) detailsHtml += `<span><i class="fas fa-calendar-alt"></i> Inscrit(e) en ${escapeHtml(person.joinDate)}</span>`;
    if (person.mutualFriends !== undefined) detailsHtml += `<span><i class="fas fa-user-friends"></i> ${person.mutualFriends} ami(s) commun(s)</span>`;
    if (person.commonCourses) detailsHtml += `<span><i class="fas fa-book"></i> ${escapeHtml(person.commonCourses)}</span>`;
    if (person.commonUniversity) detailsHtml += `<span><i class="fas fa-university"></i> ${escapeHtml(person.commonUniversity)}</span>`;
    if (person.commonPromotion) detailsHtml += `<span><i class="fas fa-calendar-alt"></i> Promo ${escapeHtml(person.commonPromotion)}</span>`;
    if (person.since) detailsHtml += `<span><i class="fas fa-calendar"></i> Depuis ${escapeHtml(person.since)}</span>`;

    let actionsHtml = '';
    const profileLink = person.id ? `profile.html?user=${encodeURIComponent(person.id)}` : '#';
    const profileBtn = `<a href="${profileLink}" class="btn-sm outline"><i class="fas fa-eye"></i> Voir profil</a>`;
    const msgLink = person.name ? `messages.html?friend=${encodeURIComponent(person.name)}` : '#';
    const msgBtn = `<a href="${msgLink}" class="btn-sm outline"><i class="fas fa-comment-dots"></i> Message</a>`;

    if (mode === 'suggestion') {
        const alreadySent = sentFriendRequests.find(r => r.id === person.id) || sentBinomeRequests.find(r => r.id === person.id);
        if (alreadySent) {
            actionsHtml = `<span class="pending-badge"><i class="fas fa-clock"></i> Demande envoyée</span> ${profileBtn}`;
        } else {
            let inviteBtns = '';
            if (person.type === 'binome' && person.domain === currentUser.domain) {
                inviteBtns += `<button class="btn-sm purple" onclick="sendRequest('${person.id}','binome')"><i class="fas fa-link"></i> Binôme</button>`;
            } else {
                inviteBtns += `<button class="btn-sm primary" onclick="sendRequest('${person.id}','ami')"><i class="fas fa-user-plus"></i> Suivre</button>`;
            }
            actionsHtml = inviteBtns + profileBtn;
        }
    } else {
        const favClass = person.favorite ? 'active' : '';
        actionsHtml = `
            ${profileBtn}
            ${msgBtn}
            <button class="btn-fav ${favClass}" onclick="toggleFavorite('${person.id}','${type}')" title="Ajouter aux favoris"><i class="fas fa-star"></i></button>
            <button class="btn-sm danger-outline" onclick="removeRelation('${person.id}','${type}')"><i class="fas fa-user-minus"></i></button>
        `;
    }

    return `<div class="person-card type-${type}">
        <div class="card-top">
            <img src="${person.avatar}" class="person-avatar" alt="${escapeHtml(person.name)}" onclick="window.location.href='profile.html?user=${encodeURIComponent(person.id||person.name)}'" />
            <div class="person-info">
                <div class="person-name">
                    ${escapeHtml(person.name)}
                    ${verifiedIcon}
                    ${badgesHtml}
                    ${tagHtml}
                    ${onlineDot}
                    ${blockedHtml}
                </div>
                <div class="person-bio">${escapeHtml(person.bio||'')}</div>
            </div>
        </div>
        <div class="person-details">${detailsHtml}</div>
        <div class="person-actions">${actionsHtml}</div>
    </div>`;
}

function renderSuggestionsBySection(list) {
    const binomesSugg = list.filter(p => p.type === 'binome');
    const amisSugg = list.filter(p => p.type !== 'binome');
    const sections = [
        { title: 'Binômes suggérés (' + (currentUser.domain || 'tous') + ')', icon: 'fa-link', items: binomesSugg },
        { title: 'Personnes à suivre', icon: 'fa-user', items: amisSugg }
    ];
    let html = '';
    sections.forEach(sec => {
        if (sec.items.length === 0) return;
        html += `<div class="suggestion-section">
            <div class="section-title"><i class="fas ${sec.icon}"></i> ${sec.title} (${sec.items.length})</div>
            ${sec.items.map(p => renderCard(p, 'suggestion')).join('')}
        </div>`;
    });
    return html || '<div class="empty-state"><i class="fas fa-lightbulb"></i><p>Aucune suggestion trouvée</p></div>';
}

function getCurrentList() {
    const q = (document.getElementById('globalSearch')?.value || '').toLowerCase();
    if (currentMainTab === 'suggestions') {
        let filtered = suggestions;
        if (q) filtered = suggestions.filter(s => s.name.toLowerCase().includes(q) || (s.bio||'').toLowerCase().includes(q));
        return { mode: 'suggestions', list: filtered };
    } else {
        let all = [];
        if (currentSubTab === 'ami') all = [...friends];
        else if (currentSubTab === 'binome') all = [...binomes];
        all.sort((a,b) => (b.favorite?1:0) - (a.favorite?1:0));
        if (q) all = all.filter(p => p.name.toLowerCase().includes(q) || (p.bio||'').toLowerCase().includes(q));
        return { mode: 'relation', list: all };
    }
}

function renderCurrentList() {
    const { mode, list } = getCurrentList();
    const container = document.getElementById('dynamicList');
    if (mode === 'suggestions') {
        container.innerHTML = renderSuggestionsBySection(list);
    } else {
        if (list.length) {
            container.innerHTML = list.map(p => renderCard(p, 'relation')).join('');
        } else {
            const labels = { ami: 'suivi', binome: 'binôme' };
            container.innerHTML = `<div class="empty-state"><i class="fas fa-user-friends"></i><p>Aucun ${labels[currentSubTab]}</p></div>`;
        }
    }
    updateBadgesCounts();
}

function updateBadgesCounts() {
    document.getElementById('suggBadge').textContent = suggestions.length;
    document.getElementById('relBadge').textContent = friends.length + binomes.length;
    const amiCount = friends.length;
    const binomeCount = binomes.length;
    const subCounts = document.querySelectorAll('.sub-count');
    if (subCounts.length >= 2) {
        subCounts[0].textContent = '(' + amiCount + ')';
        subCounts[1].textContent = '(' + binomeCount + ')';
    }
}

function switchMainTab(tab) {
    currentMainTab = tab;
    document.getElementById('tabSuggestions').classList.toggle('active', tab === 'suggestions');
    document.getElementById('tabRelations').classList.toggle('active', tab === 'relations');
    document.getElementById('subTabsContainer').style.display = tab === 'relations' ? 'flex' : 'none';
    document.getElementById('globalSearch').value = '';
    if (tab === 'relations') {
        document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
        const activeSub = document.querySelector(`.sub-tab[data-sub="${currentSubTab}"]`);
        if (activeSub) activeSub.classList.add('active');
    }
    renderCurrentList();
}

function switchSubTab(sub, btn) {
    currentSubTab = sub;
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCurrentList();
}

// ============ ACTIONS ============
function sendRequest(personId, type) {
    const person = suggestions.find(s => s.id === personId);
    if (!person) return;
    if (type === 'ami') {
        sentFriendRequests.push({ id: personId, name: person.name });
        const newFriend = {
            id: 'f_' + Date.now(),
            name: person.name,
            username: person.username,
            avatar: person.avatar,
            bio: person.bio || '',
            domain: person.domain || '',
            level: person.level || '',
            mutualFriends: person.mutualFriends || 0,
            online: Math.random() > 0.5,
            verified: person.verified || false,
            favorite: false,
            type: 'ami',
            location: person.location || 'RDC',
            joinDate: person.joinDate || '2025',
            badges: person.badges || [],
            blocked: false,
            accountType: person.accountType || 'simple'
        };
        friends.push(newFriend);
        const allUsers = getAllUsers();
        const user = allUsers.find(u => u.id === person.id);
        if (user) {
            // Les badges sont déjà dans person
        }
    } else if (type === 'binome') {
        sentBinomeRequests.push({ id: personId, name: person.name });
        const newBinome = {
            id: 'b_' + Date.now(),
            name: person.name,
            username: person.username,
            avatar: person.avatar,
            bio: person.bio || '',
            domain: person.domain || '',
            level: person.level || '',
            commonCourses: 'Cours communs',
            commonUniversity: 'Université',
            commonPromotion: '2025',
            online: Math.random() > 0.5,
            favorite: false,
            type: 'binome',
            location: person.location || 'RDC',
            joinDate: person.joinDate || '2025',
            badges: person.badges || [],
            blocked: false,
            accountType: person.accountType || 'simple'
        };
        binomes.push(newBinome);
    }
    hiddenSuggestions.push(personId);
    suggestions = suggestions.filter(s => s.id !== personId);
    saveData();
    renderCurrentList();
    showToast(`✅ ${person.name} ajouté(e) comme ${type === 'ami' ? 'suivi' : 'binôme'}`);
}

function toggleFavorite(id, type) {
    let target;
    if (type === 'ami') target = friends.find(f => f.id === id);
    else if (type === 'binome') target = binomes.find(b => b.id === id);
    if (target) {
        target.favorite = !target.favorite;
        saveData();
        renderCurrentList();
        showToast(target.favorite ? t('toast_favorite_added') : t('toast_favorite_removed'));
    }
}

function removeRelation(id, type) {
    let person;
    if (type === 'ami') {
        person = friends.find(f => f.id === id);
        if (person && confirm(t('confirm_remove'))) friends = friends.filter(f => f.id !== id);
    } else if (type === 'binome') {
        person = binomes.find(b => b.id === id);
        if (person && confirm(t('confirm_remove'))) binomes = binomes.filter(b => b.id !== id);
    }
    if (person) {
        saveData();
        renderCurrentList();
        showToast(`👋 ${person.name} retiré(e)`);
    }
}

function viewProfile(userId) {
    if (userId) window.location.href = 'profile.html?user=' + encodeURIComponent(userId);
}

function saveData() {
    localStorage.setItem('estra_friends', JSON.stringify(friends));
    localStorage.setItem('estra_binomes', JSON.stringify(binomes));
    localStorage.setItem('estra_sent_friend_requests', JSON.stringify(sentFriendRequests));
    localStorage.setItem('estra_sent_binome_requests', JSON.stringify(sentBinomeRequests));
    localStorage.setItem('estra_hidden_suggestions', JSON.stringify(hiddenSuggestions));
    syncAllUsersToDatabase();
    estraEmit('friends_updated', {});
    updateBadgesCounts();
    updateSidebarStats();
    updateRightPanelStats();
}
